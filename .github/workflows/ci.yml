name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Check Skir code formatting
      run: npx skir format --ci

    - name: Run Skir-to-Go codegen
      run: npx skir gen

    - name: Check Go code formatting
      run: |
        gofmt -l $(find . -name '*.go' -not -path '*/skirout/*') | (! grep .)

    - name: Build
      run: go build ./...

    - run: go run .
